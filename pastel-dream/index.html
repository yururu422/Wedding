<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">

  <!-- Meta / OG tags - config.js 값으로 script에서 동적 설정 -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="">
  <meta property="og:description" content="">
  <meta property="og:image" content="">
  <meta name="description" content="">

  <title>Wedding Invitation</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
</head>
<body>

  <!-- ═══ 초대장 열기 (커튼) ═══ -->
  <div id="curtain" class="curtain">
    <div class="curtain__bg"></div>
    <div class="curtain__content">
      <div class="curtain__hearts">
        <span class="curtain__heart curtain__heart--1"></span>
        <span class="curtain__heart curtain__heart--2"></span>
        <span class="curtain__heart curtain__heart--3"></span>
      </div>
      <p class="curtain__subtitle">Wedding Invitation</p>
      <p class="curtain__names" id="curtainNames"></p>
      <button class="curtain__btn" id="curtainBtn">초대장 열기</button>
    </div>
  </div>

  <!-- ═══ 떨어지는 하트 컨페티 ═══ -->
  <canvas id="heartCanvas" class="heart-canvas"></canvas>

  <!-- ═══ 토스트 알림 ═══ -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <!-- ═══ 사진 뷰어 모달 ═══ -->
  <div id="photoModal" class="photo-modal" role="dialog" aria-modal="true" aria-label="사진 보기">
    <button class="photo-modal__close" id="modalClose" aria-label="닫기">&times;</button>
    <button class="photo-modal__nav photo-modal__nav--prev" id="modalPrev" aria-label="이전 사진">&#8249;</button>
    <button class="photo-modal__nav photo-modal__nav--next" id="modalNext" aria-label="다음 사진">&#8250;</button>
    <div class="photo-modal__container" id="modalContainer">
      <img class="photo-modal__img" id="modalImg" src="" alt="사진" draggable="false">
    </div>
    <div class="photo-modal__counter" id="modalCounter"></div>
  </div>

  <!-- ═══ 본문 ═══ -->
  <main id="mainContent" class="main-content">

    <!-- ─── 메인 (히어로) ─── -->
    <section class="section hero" id="hero">
      <div class="hero__photo-wrap">
        <img class="hero__photo" id="heroPhoto" src="" alt="웨딩 사진" loading="eager">
      </div>
      <div class="hero__content">
        <p class="hero__label animate-item" data-animate="fade-down">Wedding Invitation</p>
        <h1 class="hero__names animate-item" data-animate="fade-up" id="heroNames"></h1>
        <div class="hero__divider animate-item" data-animate="fade-in"></div>
        <p class="hero__date animate-item" data-animate="fade-up" id="heroDate"></p>
        <p class="hero__venue animate-item" data-animate="fade-up" id="heroVenue"></p>
      </div>

      <!-- D-day 카운트다운 -->
      <div class="countdown animate-item" data-animate="fade-up" id="countdown">
        <p class="countdown__label" id="countdownLabel"></p>
        <div class="countdown__timer">
          <div class="countdown__item">
            <span class="countdown__number" id="countDays">0</span>
            <span class="countdown__unit">일</span>
          </div>
          <div class="countdown__sep">:</div>
          <div class="countdown__item">
            <span class="countdown__number" id="countHours">0</span>
            <span class="countdown__unit">시간</span>
          </div>
          <div class="countdown__sep">:</div>
          <div class="countdown__item">
            <span class="countdown__number" id="countMinutes">0</span>
            <span class="countdown__unit">분</span>
          </div>
          <div class="countdown__sep">:</div>
          <div class="countdown__item">
            <span class="countdown__number" id="countSeconds">0</span>
            <span class="countdown__unit">초</span>
          </div>
        </div>
      </div>
    </section>

    <!-- ─── 인사말 ─── -->
    <section class="section greeting" id="greeting">
      <div class="section__inner">
        <div class="section__deco animate-item" data-animate="fade-in"></div>
        <h2 class="section__title animate-item" data-animate="fade-up" id="greetingTitle"></h2>
        <p class="greeting__text animate-item" data-animate="fade-up" id="greetingContent"></p>
        <div class="greeting__parents animate-item" data-animate="fade-up" id="greetingParents"></div>
      </div>
    </section>

    <!-- ─── 예식 일시 (달력) ─── -->
    <section class="section calendar-section" id="calendarSection">
      <div class="section__inner">
        <h2 class="section__title animate-item" data-animate="fade-up">예식 일시</h2>
        <div class="calendar animate-item" data-animate="scale-in" id="calendarGrid"></div>
        <div class="calendar-actions animate-item" data-animate="fade-up">
          <a class="btn btn--pastel" id="googleCalBtn" href="#" target="_blank" rel="noopener">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>
            Google 캘린더
          </a>
          <button class="btn btn--pastel" id="icsDownloadBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="M12 14v4M10 16l2 2 2-2"/></svg>
            Apple 캘린더
          </button>
        </div>
      </div>
    </section>

    <!-- ─── 우리의 이야기 ─── -->
    <section class="section story" id="story">
      <div class="section__inner">
        <div class="section__deco animate-item" data-animate="fade-in"></div>
        <h2 class="section__title animate-item" data-animate="fade-up" id="storyTitle"></h2>
        <p class="story__text animate-item" data-animate="fade-up" id="storyContent"></p>
        <div class="story__photos" id="storyPhotos"></div>
      </div>
    </section>

    <!-- ─── 갤러리 ─── -->
    <section class="section gallery" id="gallery">
      <div class="section__inner">
        <div class="section__deco animate-item" data-animate="fade-in"></div>
        <h2 class="section__title animate-item" data-animate="fade-up">갤러리</h2>
        <p class="gallery__subtitle animate-item" data-animate="fade-up">사진을 클릭하면 크게 볼 수 있어요</p>
        <div class="gallery__grid" id="galleryGrid"></div>
      </div>
    </section>

    <!-- ─── 오시는 길 ─── -->
    <section class="section location" id="location">
      <div class="section__inner">
        <h2 class="section__title animate-item" data-animate="fade-up">오시는 길</h2>
        <div class="location__card animate-item" data-animate="fade-up">
          <p class="location__venue" id="locationVenue"></p>
          <p class="location__hall" id="locationHall"></p>
          <p class="location__address" id="locationAddress"></p>
          <p class="location__tel" id="locationTel"></p>
        </div>
        <button class="btn btn--text location__copy animate-item" data-animate="fade-up" id="copyAddressBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          주소 복사
        </button>
        <div class="location__map animate-item" data-animate="scale-in">
          <img class="location__map-img" id="locationMapImg" src="" alt="약도" loading="lazy">
        </div>
        <div class="location__links animate-item" data-animate="fade-up">
          <a class="btn btn--kakao" id="kakaoMapBtn" href="#" target="_blank" rel="noopener">카카오맵</a>
          <a class="btn btn--naver" id="naverMapBtn" href="#" target="_blank" rel="noopener">네이버지도</a>
        </div>
      </div>
    </section>

    <!-- ─── 마음 전하실 곳 (축의금) ─── -->
    <section class="section account" id="account">
      <div class="section__inner">
        <h2 class="section__title animate-item" data-animate="fade-up">마음 전하실 곳</h2>
        <p class="account__desc animate-item" data-animate="fade-up">축하의 마음을 담아 축의금을 전달해 보세요.</p>

        <!-- 신랑측 -->
        <div class="accordion animate-item" data-animate="fade-up">
          <button class="accordion__trigger" id="groomAccordion" aria-expanded="false">
            <span class="accordion__icon"></span>
            <span>신랑측 계좌번호</span>
            <svg class="accordion__arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="accordion__panel" id="groomAccordionPanel">
            <div class="accordion__panel-inner" id="groomAccountList"></div>
          </div>
        </div>

        <!-- 신부측 -->
        <div class="accordion animate-item" data-animate="fade-up">
          <button class="accordion__trigger" id="brideAccordion" aria-expanded="false">
            <span class="accordion__icon"></span>
            <span>신부측 계좌번호</span>
            <svg class="accordion__arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="accordion__panel" id="brideAccordionPanel">
            <div class="accordion__panel-inner" id="brideAccountList"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ─── 푸터 ─── -->
    <footer class="footer">
      <p class="footer__text" id="footerText"></p>
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
